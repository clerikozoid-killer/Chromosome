name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: lint • types • tests (hard gate)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Hard gate: levels 1-6 must be green to merge (see docs/TESTING_AND_MENTOR.md §2).
      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (types)
        run: mypy

      - name: Pytest (unit + property)
        run: pytest
